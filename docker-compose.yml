version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: icra-postgres
    environment:
      POSTGRES_DB: icra
      POSTGRES_USER: icra
      POSTGRES_PASSWORD: icra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icra -d icra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: icra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: oven/bun:1.2.13
    container_name: icra-api
    working_dir: /app
    command: ["bun", "run", "--filter", "@icra/api", "dev"]
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3001/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: oven/bun:1.2.13
    container_name: icra-web
    working_dir: /app
    command: ["bun", "run", "--filter", "@icra/web", "dev"]
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
